    <main>
        <h2>Career Guidance</h2>
        <div class="interest-form">
            <h3>Discover Your Career Path</h3>
            <form id="career-form">
                <div class="form-group">
                    <label for="skills">Your Top Skills:</label>
                    <input type="text" id="skills" placeholder="e.g., Python, Project Management, UX Design">
                </div>
                <div class="form-group">
                    <label for="interests">Your Career Interests:</label>
                    <input type="text" id="interests" placeholder="e.g., Software Development, Marketing">
                </div>
                <div class="form-group">
                    <label for="experience">Professional Experience:</label>
                    <select id="experience" name="experience">
                        <option value="0-1">Less than 1 Year</option>
                        <option value="1-3">1-3 Years</option>
                        <option value="3-5">3-5 Years</option>
                        <option value="5+">5+ Years</option>
                    </select>
                </div>
                <button type="submit" class="cta-button">Explore Career Options</button>
            </form>
        </div>
        <div id="career-results"></div>
    </main>

    <script src="script.js"></script>
</body>
